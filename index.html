<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社内お知らせ / ประกาศบริษัท</title>
<style>
  :root{
    --blue:#1f4e8c;
    --blue-light:#e8f0fb;
    --gray:#666;
    --border:#e0e0e0;
    --bg:#f5f6f8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Leelawadee UI","Hiragino Kaku Gothic ProN","Noto Sans Thai","Noto Sans JP",sans-serif;
    background:var(--bg);
    color:#222;
  }
  header{
    background:var(--blue);
    color:#fff;
    padding:18px 16px 16px;
    position:sticky;
    top:0;
    z-index:10;
    box-shadow:0 2px 6px rgba(0,0,0,.15);
  }
  header h1{
    margin:0 0 2px;
    font-size:19px;
    font-weight:700;
  }
  header p{
    margin:0;
    font-size:13px;
    opacity:.9;
  }
  .lang-toggle{
    display:flex;
    gap:6px;
    margin-top:12px;
  }
  .lang-toggle button{
    flex:1;
    padding:8px 0;
    border:none;
    border-radius:8px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    background:rgba(255,255,255,.18);
    color:#fff;
  }
  .lang-toggle button.active{
    background:#fff;
    color:var(--blue);
  }
  main{
    max-width:640px;
    margin:0 auto;
    padding:14px;
  }
  .card{
    background:#fff;
    border:1px solid var(--border);
    border-radius:12px;
    margin-bottom:14px;
    overflow:hidden;
    box-shadow:0 1px 3px rgba(0,0,0,.05);
  }
  .card-head{
    padding:14px 16px 10px;
    border-bottom:1px solid var(--border);
  }
  .badge{
    display:inline-block;
    font-size:11px;
    font-weight:700;
    color:var(--blue);
    background:var(--blue-light);
    padding:3px 9px;
    border-radius:999px;
    margin-bottom:8px;
  }
  .card-title{
    font-size:16px;
    font-weight:700;
    margin:0 0 4px;
    line-height:1.4;
  }
  .card-date{
    font-size:12px;
    color:var(--gray);
  }
  .card-body{
    padding:12px 16px 16px;
    font-size:14px;
    line-height:1.7;
    color:#333;
    white-space:pre-line;
  }
  .card-actions{
    padding:0 16px 16px;
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  .btn{
    display:inline-block;
    font-size:13px;
    font-weight:600;
    padding:9px 14px;
    border-radius:8px;
    text-decoration:none;
    background:var(--blue);
    color:#fff;
  }
  .btn.secondary{
    background:#fff;
    color:var(--blue);
    border:1px solid var(--blue);
  }
  .lang-block{display:none;}
  .lang-block.show{display:block;}
  footer{
    text-align:center;
    font-size:11px;
    color:var(--gray);
    padding:20px 16px 30px;
  }
</style>
</head>
<body>

<header>
  <h1 id="hTitle">社内お知らせボード</h1>
  <p id="hSub">スマートフォンでいつでも確認できます</p>
  <div class="lang-toggle">
    <button id="btnJa" class="active" onclick="setLang('ja')">日本語</button>
    <button id="btnTh" onclick="setLang('th')">ภาษาไทย</button>
  </div>
</header>

<main id="noticeList"></main>

<footer>
  更新: このページのHTMLファイルを編集するだけでお知らせを追加・変更できます。<br>
  QRコードで従業員がすぐに開けます。
</footer>

<script>
// ここにお知らせを追加していくだけで一覧が増えます
const notices = [
  {
    date: "2026.07.14",
    ja: {
      title: "社内報 夏の特集『夏休みの思い出』募集告知",
      body: "夏休みの思い出エピソードを社内報で募集します。写真を1枚添えてご応募ください。掲載された方にはギフトカードをプレゼント。\n応募方法: 専用フォーム(QR)・メール・口頭のいずれでもOK\n締切: 2026年8月20日(木)\nお問い合わせ: 経理室 成瀬(内線117)"
    },
    th: {
      title: "ประกาศรับสมัคร คอลัมน์พิเศษฤดูร้อน จดหมายข่าวบริษัท เรื่อง \"ความทรงจำวันหยุดฤดูร้อน\"",
      body: "ขอเชิญร่วมแบ่งปันเรื่องราวความทรงจำวันหยุดฤดูร้อนของคุณลงในจดหมายข่าวบริษัท กรุณาแนบภาพถ่ายอย่างน้อย 1 ภาพ ผู้ที่ได้รับการตีพิมพ์จะได้รับบัตรของขวัญเป็นการขอบคุณ\nวิธีสมัคร: แบบฟอร์มออนไลน์ (QR) / อีเมล / แจ้งด้วยวาจา\nกำหนดส่ง: วันพฤหัสบดีที่ 20 สิงหาคม 2026\nสอบถามเพิ่มเติม: คุณนารุเสะ แผนกบัญชี (เบอร์ต่อภายใน 117)"
    },
    filePdfJa: "社内報 夏の特集『夏休みの思い出』募集告知.pdf",
    filePdfTh: "夏休みの思い出募集告知_TH.pdf"
  },
  {
    date: "2026.07.14",
    ja: {
      title: "昇給・賞与説明資料(2026年度確定)",
      body: "2026年度の昇給・賞与改定が確定しました。\n1. 昇給: ベースアップ率が2%→4%に引き上げ\n2. 賞与(正社員): 等級基準値平均が3.3ヶ月→3.6ヶ月に引き上げ\n3. 賞与(パート・特定技能生): 物価上昇分の支給を廃止し、年間0.6ヶ月分(夏0.3・冬0.3)の固定支給に統一\n詳細は添付の資料をご確認ください。"
    },
    th: {
      title: "เอกสารชี้แจงการปรับขึ้นเงินเดือนและโบนัส (ยืนยันแล้ว ปีงบประมาณ 2026)",
      body: "การปรับขึ้นเงินเดือนและโบนัสประจำปีงบประมาณ 2026 ได้รับการยืนยันแล้ว\n1. การขึ้นเงินเดือน (Base Up): อัตราเพิ่มจาก 2% เป็น 4%\n2. โบนัส (พนักงานประจำ): ค่าเฉลี่ยตามเกรดเพิ่มจาก 3.3 เดือน เป็น 3.6 เดือน\n3. โบนัส (พาร์ทไทม์ / นักศึกษาฝึกทักษะเฉพาะทาง): ยกเลิกเงินชดเชยค่าครองชีพ เปลี่ยนเป็นจ่ายคงที่ปีละ 0.6 เดือน (ฤดูร้อน 0.3 + ฤดูหนาว 0.3)\nรายละเอียดดูได้จากเอกสารที่แนบมา"
    },
    filePdfJa: "昇給・賞与説明資料.pdf",
    filePdfTh: "昇給・賞与説明資料_TH.pdf"
  }
];

let lang = "ja";

function setLang(l){
  lang = l;
  document.getElementById("btnJa").classList.toggle("active", l==="ja");
  document.getElementById("btnTh").classList.toggle("active", l==="th");
  document.getElementById("hTitle").textContent = l==="ja" ? "社内お知らせボード" : "บอร์ดประกาศบริษัท";
  document.getElementById("hSub").textContent = l==="ja" ? "スマートフォンでいつでも確認できます" : "ดูได้ทุกที่ทุกเวลาจากสมาร์ทโฟน";
  render();
}

function render(){
  const list = document.getElementById("noticeList");
  list.innerHTML = "";
  notices.forEach(n=>{
    const t = n[lang];
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="card-head">
        <span class="badge">${n.date}</span>
        <div class="card-title">${t.title}</div>
      </div>
      <div class="card-body">${t.body}</div>
      <div class="card-actions">
        <a class="btn" href="${lang==="ja" ? (n.filePdfJa || n.filePdfTh || n.filePdf) : (n.filePdfTh || n.filePdf)}" target="_blank">${lang==="ja" ? "資料を見る (PDF)" : "เปิดเอกสาร (PDF)"}</a>
                      </div>
    `;
    list.appendChild(card);
  });
}

render();
</script>

</body>
</html>
