<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社内お知らせ / ประกาศบริษัท</title>
<style>
  :root{
    --blue:#1f4e8c;
    --blue-light:#e8f0fb;
    --gray:#666;
    --border:#e0e0e0;
    --bg:#f5f6f8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Leelawadee UI","Hiragino Kaku Gothic ProN","Noto Sans Thai","Noto Sans JP",sans-serif;
    background:var(--bg);
    color:#222;
  }
  header{
    background:var(--blue);
    color:#fff;
    padding:18px 16px 16px;
    position:sticky;
    top:0;
    z-index:10;
    box-shadow:0 2px 6px rgba(0,0,0,.15);
  }
  header h1{
    margin:0 0 2px;
    font-size:19px;
    font-weight:700;
  }
  header p{
    margin:0;
    font-size:13px;
    opacity:.9;
  }
  .lang-toggle{
    display:flex;
    gap:6px;
    margin-top:12px;
  }
  .lang-toggle button{
    flex:1;
    padding:8px 0;
    border:none;
    border-radius:8px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    background:rgba(255,255,255,.18);
    color:#fff;
  }
  .lang-toggle button.active{
    background:#fff;
    color:var(--blue);
  }
  main{
    max-width:640px;
    margin:0 auto;
    padding:14px;
  }
  .card{
    background:#fff;
    border:1px solid var(--border);
    border-radius:12px;
    margin-bottom:14px;
    overflow:hidden;
    box-shadow:0 1px 3px rgba(0,0,0,.05);
  }
  .card-head{
    padding:14px 16px 10px;
    border-bottom:1px solid var(--border);
  }
  .badge{
    display:inline-block;
    font-size:11px;
    font-weight:700;
    color:var(--blue);
    background:var(--blue-light);
    padding:3px 9px;
    border-radius:999px;
    margin-bottom:8px;
  }
  .card-title{
    font-size:16px;
    font-weight:700;
    margin:0 0 4px;
    line-height:1.4;
  }
  .card-date{
    font-size:12px;
    color:var(--gray);
  }
  .card-body{
    padding:12px 16px 16px;
    font-size:14px;
    line-height:1.7;
    color:#333;
    white-space:pre-line;
  }
  .card-actions{
    padding:0 16px 16px;
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  .btn{
    display:inline-block;
    font-size:13px;
    font-weight:600;
    padding:9px 14px;
    border-radius:8px;
    text-decoration:none;
    background:var(--blue);
    color:#fff;
  }
  .btn.secondary{
    background:#fff;
    color:var(--blue);
    border:1px solid var(--blue);
  }
  .lang-block{display:none;}
  .lang-block.show{display:block;}
  footer{
    text-align:center;
    font-size:11px;
    color:var(--gray);
    padding:20px 16px 30px;
  }
</style>
</head>
<body>

<header>
  <h1 id="hTitle">社内お知らせボード</h1>
  <p id="hSub">スマートフォンでいつでも確認できます</p>
  <div class="lang-toggle">
    <button id="btnJa" class="active" onclick="setLang('ja')">日本語</button>
    <button id="btnTh" onclick="setLang('th')">ภาษาไทย</button>
  </div>
</header>

<main id="noticeList"></main>

<footer>
  更新: このページのHTMLファイルを編集するだけでお知らせを追加・変更できます。<br>
  QRコードで従業員がすぐに開けます。
</footer>

<script>
// ここにお知らせを追加していくだけで一覧が増えます
const notices = [
  {
    date: "2026.07.20",
    ja: {
      title: "献血の実施について(8/27)",
      body: "8月27日(木)14:20〜16:20、事務棟3F食堂で受付・検査後、事務棟駐車場にて献血を実施します。\n部署ごとの時間割: 14:20技術部/14:50製造部/15:20営業部・品質保証部/15:50本社冷鍛室・総務部\n参加には職制の許可が必要です。7/1からは献血未経験者向けキャンペーンも実施中。\nお問い合わせ: 総務室 榊原(内線112)\n詳細は添付の資料をご確認ください。"
    },
    th: {
      title: "การจัดกิจกรรมบริจาคโลหิต (27 ส.ค.)",
      body: "วันพฤหัสบดีที่ 27 สิงหาคม เวลา 14:20-16:20 น. ลงทะเบียน/ตรวจร่างกายที่โรงอาหารชั้น 3 อาคารสำนักงาน จากนั้นบริจาคโลหิตที่ลานจอดรถ\nกำหนดการตามแผนก: 14:20 ฝ่ายเทคนิค / 14:50 ฝ่ายผลิต / 15:20 ฝ่ายขาย-ฝ่ายประกันคุณภาพ / 15:50 ห้องตีขึ้นรูปเย็น-ฝ่ายธุรการ\nต้องขออนุญาตหัวหน้างานก่อนเข้าร่วม ตั้งแต่ 1 ก.ค. มีแคมเปญพิเศษสำหรับผู้บริจาคครั้งแรกด้วย\nสอบถาม: คุณซากากิบาระ แผนกธุรการทั่วไป (ต่อ 112)\nรายละเอียดดูได้จากเอกสารที่แนบมา"
    },
    filePdfJa: "献血案内_JA.pdf",
    filePdfTh: "献血案内_TH.pdf"
  },
  {
    date: "2026.07.17",
    ja: {
      title: "7月度勤怠処理の迅速な対応依頼",
      body: "8月7日(金)の給与支給に間に合わせるため、7月中の出退勤打刻を徹底し、有給・欠勤区分を明確にした勤怠届を7月31日(金)までに総務室へ提出してください。\n勤務データ訂正は8月3日(月)12:00までに、経費精算・出張旅費精算の申請・承認は8月3日(月)10:00までに完了をお願いします。\nお問い合わせ: 総務室 櫻井(内線116)\n詳細は添付の資料をご確認ください。"
    },
    th: {
      title: "ขอความร่วมมือดำเนินการข้อมูลการลงเวลาเดือนกรกฎาคมโดยเร็ว",
      body: "เพื่อให้ทันการจ่ายเงินเดือนวันศุกร์ที่ 7 สิงหาคม กรุณาลงเวลาเข้า-ออกงานให้ครบถ้วนตลอดเดือนกรกฎาคม และยื่นใบแจ้งการลงเวลา (ระบุวันลาแบบมีเงินเดือน/ขาดงานให้ชัดเจน) ที่แผนกธุรการทั่วไป ภายในวันศุกร์ที่ 31 กรกฎาคม\nการแก้ไขข้อมูลการทำงาน กรุณาแจ้งภายในเที่ยงวันจันทร์ที่ 3 สิงหาคม ส่วนการเบิกค่าใช้จ่าย/ค่าเดินทางเดือนกรกฎาคม กรุณายื่นและอนุมัติให้เสร็จภายใน 10:00 น. วันจันทร์ที่ 3 สิงหาคม\nสอบถาม: คุณซากุไร แผนกธุรการทั่วไป (ต่อ 116)\nรายละเอียดดูได้จากเอกสารที่แนบมา"
    },
    filePdfJa: "勤怠処理の迅速な対応依頼(2026年夏).pdf",
    filePdfTh: "勤怠処理の迅速な対応依頼_TH.pdf"
  }
];

let lang = "ja";

function setLang(l){
  lang = l;
  document.getElementById("btnJa").classList.toggle("active", l==="ja");
  document.getElementById("btnTh").classList.toggle("active", l==="th");
  document.getElementById("hTitle").textContent = l==="ja" ? "社内お知らせボード" : "บอร์ดประกาศบริษัท";
  document.getElementById("hSub").textContent = l==="ja" ? "スマートフォンでいつでも確認できます" : "ดูได้ทุกที่ทุกเวลาจากสมาร์ทโฟน";
  render();
}

function render(){
  const list = document.getElementById("noticeList");
  list.innerHTML = "";
  notices.forEach(n=>{
    const t = n[lang];
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="card-head">
        <span class="badge">${n.date}</span>
        <div class="card-title">${t.title}</div>
      </div>
      <div class="card-body">${t.body}</div>
      <div class="card-actions">
        <a class="btn" href="${lang==="ja" ? (n.filePdfJa || n.filePdfTh || n.filePdf) : (n.filePdfTh || n.filePdf)}" target="_blank">${lang==="ja" ? "資料を見る (PDF)" : "เปิดเอกสาร (PDF)"}</a>
                      </div>
    `;
    list.appendChild(card);
  });
}

render();
</script>

</body>
</html>
